<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 七牛云大文件上传</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 加载依赖 -->
    <script src="https://cdn.staticfile.org/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.staticfile.org/plupload/3.1.6/plupload.full.min.js"></script>
    <script src="https://cdn.staticfile.org/qiniu-js/3.4.9/qiniu.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f8f9fa}
        .navbar{background:#dc3545}
        .navbar-brand{color:#fff;font-weight:bold}
        .upload-box{border:2px dashed #165DFF;padding:40px 20px;text-align:center;border-radius:8px;background:#fff;margin-bottom:30px}
        .card{border-radius:8px;overflow:hidden;position:relative}
        .batch-operations{margin-bottom:15px;display:flex;align-items:center;gap:10px}
        .checkbox-item{position:absolute;top:5px;left:5px;width:20px;height:20px;z-index:10;background:#fff;border-radius:3px}
        .card-body{padding-top:25px !important}
        
        /* 上传进度样式 */
        .upload-progress{
            width: 80%;
            margin: 20px auto;
            height: 10px;
            border-radius: 5px;
            background: #eee;
            overflow: hidden;
        }
        .progress-bar{
            height: 100%;
            background: #165DFF;
            width: 0%;
            transition: width 0.2s ease;
        }
        .progress-info{
            width: 80%;
            margin: 10px auto;
            font-size: 14px;
            color: #666;
            text-align: left;
        }
        .file-item{
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            margin: 5px 0;
        }
        /* 隐藏原生文件选择框，用按钮触发 */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="admin.html">🔐 管理员后台（七牛云）</a>
        <button class="btn btn-light btn-sm" id="logoutBtn" style="display:none" onclick="logout()">退出登录</button>
    </div>
</nav>

<div class="container py-4">
    <!-- 登录弹窗 -->
    <div id="loginBox" class="py-5 text-center">
        <input type="password" id="pwd" class="form-control w-50 mx-auto mb-3" placeholder="管理员密码：123456">
        <button class="btn btn-danger" id="loginBtn">登录后台</button>
        <p id="loginTip" class="text-muted mt-2">登录密码：123456</p>
    </div>

    <!-- 管理功能 -->
    <div id="adminMain" class="d-none">
        <div class="alert alert-warning mb-4">
            <strong>注意：</strong> 七牛云默认域名（tdsgn3px0.hd-bkt.clouddn.com）仅30天有效期，到期后需换阿里云OSS或备案自有域名！
        </div>
        
        <div class="upload-box">
            <h5>📤 大文件分片上传（支持800MB+）</h5>
            <div class="mb-3">
                <label class="form-label">素材分类</label>
                <select id="cate" class="form-select w-50 mx-auto">
                    <option value="短视频素材">短视频素材</option>
                    <option value="风景实拍">风景实拍</option>
                    <option value="人物素材">人物素材</option>
                    <option value="剪辑背景">剪辑背景</option>
                </select>
            </div>
            
            <!-- 核心修改：原生文件选择框 + 按钮触发 -->
            <input type="file" id="fileInput" multiple onchange="handleFileSelect()">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择大文件（800MB+）</button>
            <button class="btn btn-success ms-2" id="uploadBtn" disabled>开始上传</button>
            
            <!-- 上传进度 -->
            <div class="upload-progress mt-4" id="totalProgress">
                <div class="progress-bar" id="totalProgressBar"></div>
            </div>
            <div class="progress-info" id="progressText">请选择文件后点击「开始上传」</div>
            
            <!-- 已上传文件列表 -->
            <div class="mt-4 w-80 mx-auto text-left" id="fileList">
                <h6>已上传素材：</h6>
                <div id="uploadedFiles"></div>
            </div>
        </div>

        <!-- 批量删除区域 -->
        <div class="batch-operations">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
            <label for="selectAll">全选</label>
            <button class="btn btn-danger btn-sm" onclick="batchDelete()">批量删除选中素材</button>
            <span id="selectedCount" style="color:#666;">已选：0个</span>
        </div>

        <!-- 素材预览列表 -->
        <h5 class="mb-3">🗂️ 素材管理</h5>
        <div class="row g-3" id="materialList"></div>
    </div>
</div>

<script>
// ===================== 你的七牛云配置 =====================
const ACCESS_KEY = "4mVCrBCgrPfvehJeKeSaDIGwbnUaG8ke4ONPbUHq";
const SECRET_KEY = "rOaWd_g7NlLSqfnSnl8sL-tTa1Xq9M_stiwzvba8";
const BUCKET_DOMAIN = "tdsgn3px0.hd-bkt.clouddn.com";
const BUCKET_NAME = "kaixinxiaochen";
// ==========================================================

const PASSWORD = "123456";
let loginStatus = localStorage.getItem("adminLogin") === "true";
let materialData = JSON.parse(localStorage.getItem("qiniuMaterialData")) || [];
let selectedFiles = []; // 存储选中的文件

// 等待DOM加载完成
document.addEventListener('DOMContentLoaded', function() {
    console.log("页面初始化完成！");
    // 绑定登录按钮
    document.getElementById("loginBtn").addEventListener('click', login);
    // 已登录则直接显示后台
    if (loginStatus) {
        showAdminPanel();
    }
});

// 登录函数
function login() {
    let p = document.getElementById("pwd").value.trim();
    if (p === "") {
        alert("请输入登录密码！");
        return;
    }
    if (p === PASSWORD) {
        loginStatus = true;
        localStorage.setItem("adminLogin", "true");
        showAdminPanel();
        alert("登录成功！现在可以上传大文件了");
    } else {
        alert("密码错误！正确密码是：123456");
        document.getElementById("pwd").value = "";
    }
}

// 退出登录
function logout() {
    loginStatus = false;
    localStorage.setItem("adminLogin", "false");
    document.getElementById("adminMain").classList.add("d-none");
    document.getElementById("loginBox").classList.remove("d-none");
    document.getElementById("logoutBtn").style.display = "none";
    alert("已退出登录！");
}

// 显示后台面板
function showAdminPanel() {
    document.getElementById("loginBox").classList.add("d-none");
    document.getElementById("adminMain").classList.remove("d-none");
    document.getElementById("logoutBtn").style.display = "inline-block";
    renderMaterialList();
}

// 选择文件后触发（核心修复：原生文件选择）
function handleFileSelect() {
    selectedFiles = Array.from(document.getElementById("fileInput").files);
    if (selectedFiles.length === 0) {
        document.getElementById("uploadBtn").disabled = true;
        document.getElementById("progressText").textContent = "请选择文件后点击「开始上传」";
        return;
    }

    // 显示选中的文件信息
    let fileInfo = `已选择 ${selectedFiles.length} 个文件：<br>`;
    selectedFiles.forEach(file => {
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        fileInfo += `• ${file.name} (${sizeMB}MB)<br>`;
    });
    document.getElementById("progressText").innerHTML = fileInfo;
    document.getElementById("uploadBtn").disabled = false;
    // 绑定上传按钮点击事件（仅首次选择文件时绑定）
    document.getElementById("uploadBtn").onclick = startUpload;
}

// 获取七牛云上传凭证
function getUploadToken() {
    const putPolicy = {
        scope: BUCKET_NAME,
        deadline: Math.floor(Date.now() / 1000) + 3600, // 1小时有效期
    };
    try {
        const encodedPolicy = btoa(JSON.stringify(putPolicy)).replace(/\//g, '_').replace(/\+/g, '-');
        const sign = CryptoJS.HmacSHA1(encodedPolicy, SECRET_KEY).toString(CryptoJS.enc.Base64).replace(/\//g, '_').replace(/\+/g, '-');
        return ACCESS_KEY + ':' + sign + ':' + encodedPolicy;
    } catch (e) {
        console.error("生成凭证失败：", e);
        alert("生成上传凭证失败，请检查七牛云配置！");
        return null;
    }
}

// 手动开始上传（核心：原生文件 + 七牛云分片上传）
function startUpload() {
    if (selectedFiles.length === 0) {
        alert("请先选择文件！");
        return;
    }

    const token = getUploadToken();
    if (!token) return;

    const cate = document.getElementById("cate").value;
    const totalFiles = selectedFiles.length;
    let completedFiles = 0;

    // 逐个上传选中的文件
    selectedFiles.forEach(async (file) => {
        try {
            // 生成唯一文件名（避免重复）
            const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            const fileSize = file.size;
            const chunkSize = 4 * 1024 * 1024; // 4MB/片
            const chunkCount = Math.ceil(fileSize / chunkSize);

            // 初始化七牛云分片上传
            const observable = qiniu.upload(
                file,
                fileName,
                token,
                {
                    fname: file.name,
                    params: {},
                    mimeType: [file.type, '*/*']
                },
                {
                    region: qiniu.region.z0, // 华东区域（根据你的存储空间调整：z0=华东，z1=华北，z2=华南）
                    chunkSize: chunkSize,
                    concurrentRequestLimit: 3 // 并发上传数
                }
            );

            // 监听上传进度
            observable.subscribe({
                next: (res) => {
                    // 计算进度
                    const percent = res.total.percent;
                    document.getElementById("totalProgressBar").style.width = `${percent}%`;
                    document.getElementById("progressText").innerHTML = 
                        `正在上传：${file.name} <br>
                        进度：${percent.toFixed(2)}% | 已传：${(res.total.loaded/1024/1024).toFixed(2)}MB/${(fileSize/1024/1024).toFixed(2)}MB <br>
                        分片：${res.chunkIndex + 1}/${chunkCount}`;
                },
                error: (err) => {
                    console.error("上传失败：", err);
                    alert(`❌ ${file.name} 上传失败：${err.message}`);
                    document.getElementById("progressText").textContent = `❌ ${file.name} 上传失败：${err.message}`;
                },
                complete: (res) => {
                    // 上传完成，拼接文件链接
                    const fileUrl = `https://${BUCKET_DOMAIN}/${res.key}`;
                    // 保存素材信息
                    materialData.push({
                        name: file.name,
                        type: file.type.startsWith("image") ? "img" : "video",
                        cate: cate,
                        url: fileUrl,
                        key: res.key
                    });
                    localStorage.setItem("qiniuMaterialData", JSON.stringify(materialData));
                    
                    completedFiles++;
                    const totalProgress = (completedFiles / totalFiles) * 100;
                    document.getElementById("totalProgressBar").style.width = `${totalProgress}%`;
                    document.getElementById("progressText").textContent = `✅ ${file.name} 上传完成！链接：${fileUrl}`;
                    
                    // 全部上传完成后刷新列表
                    if (completedFiles === totalFiles) {
                        renderMaterialList();
                        alert(`✅ 所有文件上传完成！共上传 ${completedFiles} 个文件`);
                        // 重置按钮和文件选择框
                        document.getElementById("uploadBtn").disabled = true;
                        document.getElementById("fileInput").value = "";
                        selectedFiles = [];
                    }
                }
            });
        } catch (e) {
            console.error("上传异常：", e);
            alert(`❌ ${file.name} 上传异常：${e.message}`);
        }
    });
}

// 渲染素材列表
function renderMaterialList() {
    const list = document.getElementById("materialList");
    const fileList = document.getElementById("uploadedFiles");
    
    if (materialData.length === 0) {
        list.innerHTML = '<div class="col-12 text-center text-muted">暂无素材</div>';
        fileList.innerHTML = '<div class="text-muted">暂无上传的素材</div>';
        updateSelectedCount();
        return;
    }

    let html = "";
    let fileHtml = "";
    materialData.forEach((item, i) => {
        let media = item.type === "img" 
            ? `<img src="${item.url}" width="100%" height="120" style="object-fit:cover" onclick="preview('${item.url}')">`
            : `<video src="${item.url}" width="100%" height="120" style="object-fit:cover" controls onclick="preview('${item.url}')">`;
        
        html += `
        <div class="col-lg-2 col-md-3 col-sm-4 col-6">
            <div class="card">
                <input type="checkbox" class="checkbox-item" data-index="${i}" onclick="updateSelectedCount()">
                ${media}
                <div class="card-body p-2">
                    <p class="small text-truncate">${item.name}</p>
                    <button class="btn btn-sm btn-danger w-100" onclick="deleteMaterial(${i})">删除</button>
                </div>
            </div>
        </div>`;

        fileHtml += `<div class="file-item">✅ ${item.name} - <a href="${item.url}" target="_blank">点击查看</a></div>`;
    });

    list.innerHTML = html;
    fileList.innerHTML = fileHtml;
    updateSelectedCount();
}

// 预览素材
function preview(url) {
    window.open(url, "_blank");
}

// 单个删除
function deleteMaterial(index) {
    const item = materialData[index];
    if (!confirm(`确定删除 ${item.name} 吗？`)) return;

    materialData.splice(index, 1);
    localStorage.setItem("qiniuMaterialData", JSON.stringify(materialData));
    renderMaterialList();
    alert("素材本地记录已删除（七牛云文件需手动去控制台删除）！");
}

// 全选/取消全选
function toggleSelectAll() {
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.checkbox-item');
    checkboxes.forEach(checkbox => checkbox.checked = selectAll.checked);
    updateSelectedCount();
}

// 更新选中数量
function updateSelectedCount() {
    const count = document.querySelectorAll('.checkbox-item:checked').length;
    document.getElementById("selectedCount").textContent = `已选：${count}个`;
}

// 批量删除
function batchDelete() {
    const checkboxes = document.querySelectorAll('.checkbox-item:checked');
    const count = checkboxes.length;
    if (count === 0) {
        alert("请先勾选要删除的素材！");
        return;
    }

    if (confirm(`确定删除选中的 ${count} 个素材吗？`)) {
        const indexes = Array.from(checkboxes)
            .map(cb => parseInt(cb.dataset.index))
            .sort((a, b) => b - a);
        
        indexes.forEach(idx => materialData.splice(idx, 1));
        localStorage.setItem("qiniuMaterialData", JSON.stringify(materialData));
        renderMaterialList();
        document.getElementById('selectAll').checked = false;
        alert(`成功删除 ${count} 个素材的本地记录！`);
    }
}
</script>
</body>
</html>
