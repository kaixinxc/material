<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 素材管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f8f9fa}
        .navbar{background:#dc3545}
        .navbar-brand{color:#fff;font-weight:bold}
        .upload-box{border:2px dashed #165DFF;padding:40px 20px;text-align:center;border-radius:8px;background:#fff;margin-bottom:30px}
        .card{border-radius:8px;overflow:hidden;position:relative}
        .preview-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center}
        .preview-modal.active{display:flex}
        .close{position:absolute;top:20px;right:30px;color:#fff;font-size:40px;cursor:pointer}
        
        /* 上传进度样式 */
        .progress-container{
            width: 80%;
            margin: 20px auto;
            display: none;
        }
        .upload-progress{
            height: 8px;
            border-radius: 4px;
            background: #eee;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-bar{
            height: 100%;
            background: #165DFF;
            width: 0%;
            transition: width 0.2s ease;
        }
        .progress-text{
            font-size: 14px;
            color: #666;
        }
        .upload-status{
            margin-top: 10px;
            font-size: 14px;
            color: #28a745;
            display: none;
        }
        .upload-error{
            color: #dc3545;
        }

        /* 批量删除样式 */
        .batch-operations{
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-item{
            position: absolute;
            top: 5px;
            left: 5px;
            width: 20px;
            height: 20px;
            z-index: 10;
            background: #fff;
            border-radius: 3px;
        }
        .card-body{
            padding-top: 25px !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="admin.html">🔐 管理员后台</a>
        <button class="btn btn-light btn-sm" onclick="logout()">退出登录</button>
    </div>
</nav>

<div class="container py-4">
    <!-- 登录弹窗 -->
    <div id="loginBox" class="py-5 text-center">
        <input type="password" id="pwd" class="form-control w-50 mx-auto mb-3" placeholder="请输入密码">
        <button class="btn btn-danger" onclick="login()">登录后台</button>
    </div>

    <!-- 管理功能（登录后显示） -->
    <div id="adminMain" class="d-none">
        <!-- 上传区域 -->
        <div class="upload-box">
            <h5>📤 批量上传素材（图片/视频）</h5>
            <p class="text-muted">支持JPG/PNG/MP4，可多选文件</p>
            <select id="cate" class="form-select w-50 mx-auto my-3">
                <option value="短视频素材">短视频素材</option>
                <option value="风景实拍">风景实拍</option>
                <option value="人物素材">人物素材</option>
                <option value="剪辑背景">剪辑背景</option>
            </select>
            <input type="file" id="file" multiple accept="image/*,video/*" class="d-none">
            <button class="btn btn-primary" onclick="document.getElementById('file').click()">选择多个文件上传</button>
            
            <!-- 上传进度区域 -->
            <div class="progress-container" id="progressContainer">
                <div class="upload-progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">上传进度：0%</div>
            </div>
            <div class="upload-status" id="uploadStatus"></div>
        </div>

        <!-- 批量操作区域 -->
        <div class="batch-operations">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
            <label for="selectAll">全选</label>
            <button class="btn btn-danger btn-sm" onclick="batchDelete()">批量删除选中素材</button>
            <span id="selectedCount" style="color:#666;">已选：0个</span>
        </div>

        <!-- 素材管理列表 -->
        <h5 class="mb-3">🗂️ 素材管理</h5>
        <div class="row g-3" id="list"></div>
    </div>
</div>

<!-- 预览弹窗 -->
<div class="preview-modal" id="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="preview-media" id="preImg">
    <video class="preview-media" id="preVideo" controls></video>
</div>

<script>
const PASSWORD = "goodluck";
let data = JSON.parse(localStorage.getItem("materialData")) || [];
let loginStatus = localStorage.getItem("adminLogin") === "true";

// 进度条相关元素
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const uploadStatus = document.getElementById('uploadStatus');

window.onload = function(){
    if(loginStatus){showAdmin()}
    renderList();
}

// 登录
function login(){
    let p = document.getElementById("pwd").value;
    if(p === PASSWORD){
        loginStatus = true;
        localStorage.setItem("adminLogin","true");
        showAdmin();
    }else{alert("密码错误！")}
}

// 退出
function logout(){
    loginStatus = false;
    localStorage.setItem("adminLogin","false");
    location.reload();
}

// 显示后台
function showAdmin(){
    document.getElementById("loginBox").classList.add("d-none");
    document.getElementById("adminMain").classList.remove("d-none");
}

// 批量上传（支持多文件）
document.getElementById("file").addEventListener("change",async e=>{
    let files = e.target.files;
    if(files.length === 0) return;
    
    let cate = document.getElementById("cate").value;
    let totalFiles = files.length;
    let completedFiles = 0;

    // 显示进度条
    progressContainer.style.display = 'block';
    uploadStatus.style.display = 'none';
    uploadStatus.className = 'upload-status';

    // 逐个上传文件
    for(let f of files){
        try {
            // 更新当前上传文件信息
            progressText.textContent = `正在上传：${f.name} (${completedFiles+1}/${totalFiles}) - 0%`;
            progressBar.style.width = '0%';

            // 带进度的Base64转换
            let src = await toBase64WithProgress(f, (progress) => {
                let percent = Math.round(progress * 100);
                progressBar.style.width = `${percent}%`;
                progressText.textContent = `正在上传：${f.name} (${completedFiles+1}/${totalFiles}) - ${percent}%`;
            });

            // 保存到本地存储
            data.push({
                name:f.name,
                type:f.type.startsWith("image")?"img":"video",
                cate:cate,
                src:src
            });

            completedFiles++;
            // 更新进度为100%
            progressBar.style.width = '100%';
            progressText.textContent = `上传完成：${f.name} (${completedFiles}/${totalFiles}) - 100%`;
            
        } catch (error) {
            // 上传失败提示
            uploadStatus.style.display = 'block';
            uploadStatus.className = 'upload-status upload-error';
            uploadStatus.textContent = `文件 ${f.name} 上传失败：${error.message}`;
            console.error("上传失败", error);
        }
    }

    // 全部上传完成
    localStorage.setItem("materialData",JSON.stringify(data));
    renderList();
    
    // 显示最终状态
    uploadStatus.style.display = 'block';
    uploadStatus.textContent = `✅ 批量上传完成！共${completedFiles}/${totalFiles}个文件，前台已同步`;
    
    // 3秒后隐藏进度条
    setTimeout(() => {
        progressContainer.style.display = 'none';
    }, 3000);

    // 清空文件选择框
    document.getElementById("file").value = "";
});

// 带进度的Base64转换函数
function toBase64WithProgress(file, onProgress) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        
        // 进度回调
        reader.onprogress = function(e) {
            if (e.lengthComputable) {
                const progress = e.loaded / e.total;
                onProgress(progress);
            }
        };
        
        // 完成回调
        reader.onload = function() {
            resolve(reader.result);
        };
        
        // 错误回调
        reader.onerror = function(error) {
            reject(error);
        };
        
        // 开始读取
        reader.readAsDataURL(file);
    });
}

// 渲染素材列表（新增复选框）
function renderList(){
    let list = document.getElementById("list");
    let html = "";
    
    if(data.length === 0){
        list.innerHTML = '<div class="col-12 text-center text-muted">暂无素材</div>';
        updateSelectedCount();
        return;
    }

    data.forEach((item,i)=>{
        let media = item.type==="img"
            ?`<img src="${item.src}" width="100%" height="120" style="object-fit:cover">`
            :`<video src="${item.src}" width="100%" height="120" style="object-fit:cover"></video>`;
        
        html += `
        <div class="col-lg-2 col-md-3 col-sm-4 col-6">
            <div class="card">
                <input type="checkbox" class="checkbox-item" data-index="${i}" onclick="updateSelectedCount()">
                ${media}
                <div class="card-body p-2">
                    <p class="small text-truncate">${item.name}</p>
                    <button class="btn btn-sm btn-danger w-100" onclick="del(${i})">删除</button>
                </div>
            </div>
        </div>`;
    });
    list.innerHTML = html;
    updateSelectedCount();
}

// 单个删除
function del(i){
    if(confirm("确定删除该素材吗？")){
        data.splice(i,1);
        localStorage.setItem("materialData",JSON.stringify(data));
        renderList();
    }
}

// 全选/取消全选
function toggleSelectAll(){
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.checkbox-item');
    
    checkboxes.forEach(checkbox => {
        checkbox.checked = selectAll.checked;
    });
    updateSelectedCount();
}

// 更新选中数量
function updateSelectedCount(){
    const checkboxes = document.querySelectorAll('.checkbox-item:checked');
    const count = checkboxes.length;
    document.getElementById('selectedCount').textContent = `已选：${count}个`;
}

// 批量删除
function batchDelete(){
    const checkboxes = document.querySelectorAll('.checkbox-item:checked');
    const selectedCount = checkboxes.length;
    
    if(selectedCount === 0){
        alert("请先勾选要删除的素材！");
        return;
    }

    if(confirm(`确定删除选中的 ${selectedCount} 个素材吗？此操作不可恢复！`)){
        // 收集选中的索引（倒序删除，避免索引错乱）
        const selectedIndexes = Array.from(checkboxes)
            .map(checkbox => parseInt(checkbox.dataset.index))
            .sort((a,b) => b - a);
        
        // 批量删除
        selectedIndexes.forEach(index => {
            data.splice(index, 1);
        });
        
        // 保存数据并重新渲染
        localStorage.setItem("materialData",JSON.stringify(data));
        renderList();
        
        // 取消全选
        document.getElementById('selectAll').checked = false;
        
        alert(`成功删除 ${selectedCount} 个素材！`);
    }
}

// 预览
function show(type,src){
    let m = document.getElementById("modal");
    let img = document.getElementById("preImg");
    let video = document.getElementById("preVideo");
    m.classList.add("active");
    type==="img"?(img.style.display="block",video.style.display="none",img.src=src):(img.style.display="none",video.style.display="block",video.src=src);
}

function closeModal(){
    document.getElementById("modal").classList.remove("active");
    document.getElementById("preVideo").pause();
}
</script>
</body>
</html>
